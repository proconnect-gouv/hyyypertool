#

name: 🚥 E2E

on:
  push:
  # pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "e2e"

    steps:
      - name: Set artifact name
        id: artifact
        run: echo "name=$(echo '${{ matrix.e2e_test }}' | sed 's/\//-/g')" >> $GITHUB_OUTPUT
        working-directory: "."

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: package.json

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@16feee727cbdc83b6a014e6cc26fec4a79bcf30c # v2.2.0

      - name: Create mocked services
        run: docker compose up --build --detach
        working-directory: "."

      - name: 🌭 Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - run: bun install --frozen-lockfile
        working-directory: "."

      - name: 🗃️ Migrate database
        run: |
          bun run db:migrate
        working-directory: "."

      - name: cypress-io/github-action needs package-lock.json
        run: |
          touch package-lock.json

      - name: Cypress run
        uses: cypress-io/github-action@948d67d3074f1bbb6379c8bdbb04e95d2f8e593f # v7.4.0
        env:
          CONSOLA_LEVEL: "2"
          DEPLOY_ENV: "production"
          NODE_ENV: "development"
        with:
          browser: chrome
          build: bun run build
          install-command: bun install --frozen-lockfile
          spec: features/${{ matrix.e2e_test }}
          start: bun run start
          working-directory: e2e

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          compression-level: 9
          name: cypress-${{ steps.artifact.outputs.name }}-screenshots
          path: e2e/cypress/screenshots

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          compression-level: 9
          name: cypress-${{ steps.artifact.outputs.name }}-videos
          path: e2e/cypress/videos

    strategy:
      fail-fast: false
      matrix:
        e2e_test:
          - auth
          - delivrability-domain
          - moderations/accept_blocking_moderation.feature
          - moderations/add_external_member.feature
          - moderations/add_internal_member.feature
          - moderations/filter_by_moderator.feature
          - moderations/handle_big_organization.feature
          - moderations/handle_duplicate_requests.feature
          - moderations/manage_external_domain.feature
          - moderations/manage_internal_domain.feature
          - moderations/moderation_detail.feature
          - moderations/moderation_list.feature
          - moderations/reject_blocking_moderation.feature
          - moderations/reprocess_completed_moderation.feature
          - moderations/select_verification_type.feature
          - moderations/tab_navigation.feature
          - moderations/validate_similar_moderations.feature
          - moderations/verify_domain.feature
          - organizations
          - response-templates
          - team
          - users

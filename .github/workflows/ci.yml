#

name: 👷 CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  TZ: Europe/Paris
  CYPRESS_INSTALL_BINARY: 0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 🟢 Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
      - name: 🐳 Start mocked services
        run: docker compose up postgres-hyyyperbase --build --detach --wait
        working-directory: "."
      - name: 🐰 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile
      - name: ✨ Check formatting
        run: bun run format
      - name: 🔨 Build
        run: bun run build
      - name: ✅ Type-check
        run: bun run test:type-check
      - name: 🧪 Run unit tests
        run: bun run test:unit
          --coverage
          --coverage-reporter=lcov
          --coverage-reporter=text

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🐰 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile
        working-directory: "."
      - name: 🧹 Lint root
        run: bun run lint
        working-directory: "."

      - name: 📦 Install e2e dependencies
        run: bun install --frozen-lockfile
        working-directory: "e2e"
      - name: 🧹 Lint e2e
        run: bun run lint
        working-directory: "e2e"

  feature-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 🐰 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile
      - name: 🕸️ Install WebKit dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev
      - name: 🖥️ Start display server
        run: Xvfb :99 -screen 0 1280x720x24 & sleep 1
      - name: 🎭 Run feature tests
        run: DISPLAY=:99 bun run test:features
